services:
  targeting_db:
    image: postgres
    environment:
      POSTGRES_DB: targeting_db
      POSTGRES_USER: targeting_user
      POSTGRES_PASSWORD: targeting_password
    volumes:
      - targetingpgdata:/var/lib/postgresql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql  
    ports:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U targeting_user -d targeting_db"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 1m
    networks:
      - targetingNetwork

  targeting_service:
    build: .
    depends_on:
      targeting_db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://targeting_user:targeting_password@targeting_db:5432/targeting_db"
      AUTH_SERVICE_URL: "http://host.docker.internal:8001"
    ports:
      - "8003:8003"
    networks:
      - targetingNetwork

networks:
  targetingNetwork:
volumes:
  targetingpgdata: